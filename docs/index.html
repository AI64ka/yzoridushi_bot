<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daniel Ramo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;color:#f6f0ff;min-height:100vh;overflow-x:hidden;background:linear-gradient(180deg,#180b3c,#0a0512)}
.aura{position:fixed;inset:-30%;z-index:0;pointer-events:none;background:radial-gradient(closest-side at 50% 10%,rgba(210,130,255,.5),transparent 70%),radial-gradient(closest-side at 84% 20%,rgba(255,200,110,.35),transparent 70%),radial-gradient(closest-side at 60% 80%,rgba(255,110,220,.28),transparent 70%);filter:blur(8px);animation:breathe 12s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.12);opacity:1}}
.sacred{position:fixed;top:50%;left:50%;width:150vh;height:150vh;transform:translate(-50%,-50%);z-index:1;pointer-events:none;opacity:.08;border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(255,220,140,.7) 0deg .25deg,transparent .25deg 6deg);-webkit-mask:radial-gradient(circle,transparent 17%,#000 25%,#000 55%,transparent 70%);mask:radial-gradient(circle,transparent 17%,#000 25%,#000 55%,transparent 70%);animation:spinSlow 140s linear infinite}
@keyframes spinSlow{to{transform:translate(-50%,-50%) rotate(360deg)}}
.frame{position:fixed;inset:0;z-index:40;pointer-events:none;border:6px solid transparent;border-image:linear-gradient(135deg,#7a5a1e,#ffe7a8,#d9b877,#fff6e0,#b98f3f) 1;box-shadow:inset 0 0 26px rgba(255,210,130,.22)}
.wrap{position:relative;z-index:3;padding:24px 16px 34px;max-width:560px;margin:0 auto}
.emblem{width:78px;height:78px;margin:2px auto 10px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(255,236,160,1) 0%,rgba(220,150,255,.7) 20%,transparent 52%),repeating-conic-gradient(from 0deg,rgba(255,216,120,.95) 0deg 1.3deg,transparent 1.3deg 8deg);-webkit-mask:radial-gradient(circle,#000 30%,rgba(0,0,0,.4) 50%,transparent 72%);mask:radial-gradient(circle,#000 30%,rgba(0,0,0,.4) 50%,transparent 72%);animation:spin 24s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{text-align:center}
.brand h1{font-family:Georgia,serif;font-weight:700;font-size:32px;color:#f0d9a8}
.brand p{font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:#cbb8f2;margin-top:6px}
.divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 6px}
.divider i{height:1px;width:60px;background:linear-gradient(90deg,transparent,rgba(255,214,130,.8))}
.divider i:last-child{background:linear-gradient(90deg,rgba(255,214,130,.8),transparent)}
.divider b{width:8px;height:8px;transform:rotate(45deg);background:linear-gradient(135deg,#ffe7a8,#e7a5ff)}
nav{display:flex;gap:8px;overflow-x:auto;margin:14px 0 18px;padding-bottom:2px}
nav button{flex:0 0 auto;font-size:13px;padding:8px 15px;border-radius:20px;color:#d6c8f6;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,214,140,.2);font-family:inherit;white-space:nowrap}
nav button.active{color:#2a1233;font-weight:600;border-color:transparent;background:linear-gradient(180deg,#ffe0a0,#e7a5ff)}
.section-title{font-family:Georgia,serif;font-size:22px;font-weight:700;margin:2px 2px 14px;color:#f4dcaa}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.card{border-radius:18px;overflow:hidden;background:#130a2c;border:1px solid rgba(205,165,255,.24);box-shadow:0 12px 30px rgba(50,20,90,.5)}
.art{height:150px;background:#1a1140;position:relative}
.art img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:10px 11px 12px}
.body .t{font-family:Georgia,serif;font-size:15px;font-weight:600;color:#f8f2ff;line-height:1.2}
.body .p{font-size:12px;color:#f0d9a8;margin-top:3px;font-weight:600}
.order{position:relative;overflow:hidden;margin-top:9px;width:100%;font-size:12px;padding:8px;border:none;border-radius:10px;color:#2a1233;font-weight:600;font-family:inherit;cursor:pointer;background:linear-gradient(180deg,#ffe0a0,#e3a0ff);box-shadow:0 5px 16px rgba(230,160,255,.4);transition:transform .1s}
.order::before{content:'✦ '}
.order:active{transform:scale(.97)}
.order.flash{animation:tap .25s ease}
@keyframes tap{0%{filter:brightness(1)}35%{filter:brightness(1.9)}100%{filter:brightness(1)}}
section{display:none}section.active{display:block}
</style>
</head>
<body>
<div class="aura"></div><div class="sacred"></div><div class="frame"></div>
<div class="wrap">
<div class="emblem"></div>
<div class="brand"><h1>Daniel&nbsp;Ramo</h1><p>метахудожник · арт-терапевт</p></div>
<div class="divider"><i></i><b></b><i></i></div>
<nav id="nav"></nav>
<div id="content"></div>
</div>
<script>
// ====== КАТАЛОГ: правь названия и цены здесь ======
const CDN='https://static.tildacdn.com/';
const DATA=[
 {id:'portrait',tab:'Энергопортрет',title:'Энергопортрет — вибрационный узор души',items:[
   {img:'tild3361-6561-4963-a133-663635616236/1.jpg',t:'Тариф «Базовый»',p:'28 888 ₽'},
   {img:'tild6630-6266-4264-a539-653234346266/2.jpg',t:'Тариф «Стандарт»',p:'34 444 ₽'},
   {img:'tild3933-6665-4864-a361-343435336161/3.jpg',t:'Тариф «VIP»',p:'по запросу'},
 ]},
 {id:'paintings',tab:'Картины',title:'Серия «Чувства космоса»',items:[
   {img:'tild3136-3039-4839-a264-363964306261/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
   {img:'tild3236-3632-4331-b263-333733373038/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
   {img:'tild3162-6635-4863-b239-653261663134/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
   {img:'tild3361-6165-4433-b930-663961316430/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
   {img:'tild6535-6432-4432-b965-366666643363/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
   {img:'tild3164-3035-4864-a363-333233306331/photo_2022-07-27_23-.jpg',t:'Картина',p:'по запросу'},
 ]},
 {id:'therapy',tab:'Арт-терапия',title:'Сессии арт-терапии',items:[
   {img:'tild6133-6635-4636-a433-343061653939/photo_2022-07-27_20-.jpg',t:'Чакральная диагностика',p:'по запросу'},
   {img:'tild3864-3566-4465-a662-396563366138/photo_2022-07-27_20-.jpg',t:'Сессия арт-терапии',p:'по запросу'},
 ]},
];
// ==================================================
const nav=document.getElementById('nav'), content=document.getElementById('content');
DATA.forEach((s,idx)=>{
  const b=document.createElement('button'); b.textContent=s.tab; b.className=idx===0?'active':'';
  b.onclick=()=>{[...nav.children].forEach(x=>x.classList.remove('active'));[...content.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('sec-'+s.id).classList.add('active');try{tg.HapticFeedback.selectionChanged();}catch(e){}};
  nav.appendChild(b);
  const sec=document.createElement('section'); sec.id='sec-'+s.id; if(idx===0)sec.className='active';
  let html='<div class="section-title">'+s.title+'</div><div class="grid">';
  s.items.forEach(it=>{html+='<div class="card"><div class="art"><img loading="lazy" src="'+CDN+it.img+'"></div><div class="body"><div class="t">'+it.t+'</div><div class="p">'+it.p+'</div><button class="order" data-i="'+it.t+'" data-p="'+it.p+'">Заказать</button></div></div>';});
  html+='</div>'; sec.innerHTML=html; content.appendChild(sec);
});
const tg=window.Telegram.WebApp; tg.ready(); tg.expand();
try{tg.setBackgroundColor('#0a0512');tg.setHeaderColor('#140b3c');}catch(e){}
document.querySelectorAll('.order').forEach(b=>b.addEventListener('click',()=>{
  try{tg.HapticFeedback.impactOccurred('medium');}catch(e){}b.classList.add('flash');
  const p=JSON.stringify({type:'order',item:b.dataset.i,price:b.dataset.p});
  setTimeout(()=>{try{tg.HapticFeedback.notificationOccurred('success');}catch(e){}tg.sendData(p);},240);
}));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daniel Ramo</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'Manrope',-apple-system,system-ui,sans-serif;
      color:#f6f0ff; min-height:100vh; overflow-x:hidden;
      background:linear-gradient(180deg,#180b3c 0%,#0a0512 100%);
    }
    /* fon-sloi */
    .aura{position:fixed;inset:-30%;z-index:0;pointer-events:none;
      background:
        radial-gradient(closest-side at 50% 10%,rgba(210,130,255,.55),transparent 70%),
        radial-gradient(closest-side at 84% 20%,rgba(255,200,110,.38),transparent 70%),
        radial-gradient(closest-side at 12% 32%,rgba(90,205,255,.3),transparent 70%),
        radial-gradient(closest-side at 60% 80%,rgba(255,110,220,.28),transparent 70%);
      filter:blur(8px);animation:breathe 12s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:scale(1) rotate(0);opacity:.85}50%{transform:scale(1.12) rotate(8deg);opacity:1}}
    .stars{position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:
        radial-gradient(1.5px 1.5px at 18% 22%,#fff,transparent),
        radial-gradient(1.3px 1.3px at 72% 14%,#ffe6b0,transparent),
        radial-gradient(1px 1px at 40% 58%,#cfe6ff,transparent),
        radial-gradient(1.5px 1.5px at 88% 48%,#fff,transparent),
        radial-gradient(1.2px 1.2px at 56% 84%,#ffd9f4,transparent),
        radial-gradient(1.1px 1.1px at 10% 72%,#fff,transparent),
        radial-gradient(1.3px 1.3px at 30% 40%,#fff2c8,transparent);
      background-size:cover;animation:twinkle 3.6s ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:.4}50%{opacity:.95}}

    /* zolotoy baget */
    .frame{position:fixed;inset:0;z-index:40;pointer-events:none;
      border:6px solid transparent;
      border-image:linear-gradient(135deg,#7a5a1e,#ffe7a8,#d9b877,#fff6e0,#b98f3f) 1;
      box-shadow:inset 0 0 26px rgba(255,210,130,.22);}
    .frame2{position:fixed;inset:10px;z-index:40;pointer-events:none;
      border:1px solid rgba(255,214,140,.35);}

    .wrap{position:relative;z-index:3;padding:26px 18px 30px;max-width:520px;margin:0 auto;}

    .emblem{width:88px;height:88px;margin:4px auto 12px;position:relative;}
    .emblem .rays{position:absolute;inset:0;border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%,rgba(255,236,160,1) 0%,rgba(220,150,255,.7) 20%,transparent 52%),
        repeating-conic-gradient(from 0deg,rgba(255,216,120,.95) 0deg 1.3deg,transparent 1.3deg 8deg);
      -webkit-mask:radial-gradient(circle,#000 30%,rgba(0,0,0,.4) 50%,transparent 72%);
              mask:radial-gradient(circle,#000 30%,rgba(0,0,0,.4) 50%,transparent 72%);
      animation:spin 24s linear infinite,glow 4.5s ease-in-out infinite;}
    .emblem .ring{position:absolute;inset:8px;border-radius:50%;border:1.4px dashed rgba(255,214,130,.7);animation:spinRev 16s linear infinite;}
    .emblem .core{position:absolute;inset:34px;border-radius:50%;
      background:radial-gradient(circle,#fff7df,#ffd98f 55%,rgba(255,200,120,0));animation:corePulse 3s ease-in-out infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spinRev{to{transform:rotate(-360deg)}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 16px rgba(255,205,120,.6))}50%{filter:drop-shadow(0 0 30px rgba(220,140,255,.85))}}
    @keyframes corePulse{0%,100%{transform:scale(.85);opacity:.85}50%{transform:scale(1.12);opacity:1}}

    .brand{text-align:center}
    .brand h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:36px;letter-spacing:.5px;
      background:linear-gradient(100deg,#e9c98a 0%,#fff6e0 38%,#ffe9b0 50%,#e9c98a 66%,#d9b877 100%);
      background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
      filter:drop-shadow(0 0 18px rgba(233,201,138,.35));animation:shimmer 5.5s linear infinite;}
    @keyframes shimmer{to{background-position:-220% center}}
    .brand p{font-size:11px;letter-spacing:2.6px;text-transform:uppercase;color:#cbb8
